global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "microvibe"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "microvibe-app"
  - job_name: "metrics-sim"
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: "microvibe-metrics-sim"
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
